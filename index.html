<!DOCTYPE html>
<html>
<head>
<title>Birthday Love Surprise ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#ffd6e0,#ffe5ec,#e0f7fa,#f3e5f5);
margin:0;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
}

/* 🌸 SMALL RECTANGLE CARD */
.card{
background: rgba(255,255,255,0.9);
padding:18px;
border-radius:15px;

width:90%;
max-width:320px;   /* 🔥 small rectangle */
height:300px;      /* 🔥 fixed height */

box-shadow:0 6px 18px rgba(0,0,0,0.15);

/* CENTER CONTENT */
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.95);}
to{opacity:1; transform:scale(1);}
}

/* TEXT */
h1,h2,h3{
margin:5px 0;
font-size:18px;
}

p{
font-size:13px;
margin:5px 0;
}

/* BUTTON */
button{
padding:8px 14px;
margin:6px;
border:none;
border-radius:8px;
font-size:13px;
background:#ff8fab;
color:white;
font-weight:bold;
}

button:hover{
background:#ff6f91;
}

/* INPUT */
select,input{
padding:8px;
font-size:13px;
margin-top:8px;
border-radius:6px;
border:none;
width:80%;
}

/* IMAGE */
.final-img{
width:120px;
border-radius:12px;
margin-top:10px;
}

</style>
</head>

<body>

<audio autoplay loop>
<source src="https://www.bensound.com/bensound-music/bensound-love.mp3">
</audio>

<div class="card" id="start">
<h2>💗 Love Test 💗</h2>
<p>Birthday surprise ❤️</p>
<button onclick="startTest()">Start ▶</button>
</div>

<div class="card" id="card1" style="display:none;">
<h3>Happy Birthday Yuvan 🎂</h3>
<p>You are my happiness 🥰</p>
<button onclick="runNext('card1','card2')">Next ▶</button>
</div>

<div class="card" id="card2" style="display:none;">
<h3>How much do you love me? 💌</h3>
<select id="love">
<option value="">Choose</option>
<option>25%</option>
<option>50%</option>
<option>75%</option>
<option>100%</option>
<option value="infinity">♾️ Infinity</option>
</select>
<button onclick="checkLove()">OK</button>
<p id="msg1"></p>
</div>

<div class="card" id="card3" style="display:none;">
<h3>Where did we meet? 💕</h3>
<button onclick="temple()">Temple</button>
<button onclick="house()">House</button>
<p id="msg2"></p>
</div>

<div class="card" id="card4" style="display:none;">
<h3>Our date? 💖</h3>
<input id="dateInput" placeholder="Dec 24">
<button onclick="checkDate()">OK</button>
<p id="msg3"></p>
</div>

<div class="card" id="card5" style="display:none;">
<h3>First movie? 🎬</h3>
<button onclick="movie1()">NEEK</button>
<button onclick="movie2()">DRAGON</button>
<p id="msg4"></p>
</div>

<div class="card" id="card6" style="display:none;">
<h3>Dress color? 👕</h3>
<button onclick="wrongColor()">Black</button>
<button onclick="wrongColor()">Blue</button>
<button onclick="correctColor()">White</button>
<button onclick="wrongColor()">Red</button>
<p id="msg5"></p>
</div>

<div class="card" id="card7" style="display:none;">
<h3>💐</h3>
<img src="YOUR-IMAGE-LINK-HERE" class="final-img">
<p>My love for you 💖</p>
</div>

<div class="card" id="card8" style="display:none;">
<h3>Final ❤️</h3>
<p>You are my favourite person</p>
<p>Happy Birthday 🎂</p>
<p>I love you ♾️ – Anu ❤️</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

function startTest(){
start.style.display="none";
card1.style.display="block";
}

function runNext(c,n){
document.getElementById(c).style.display="none";
document.getElementById(n).style.display="block";
}

function checkLove(){
if(love.value=="infinity"){
msg1.innerHTML="Correct ❤️<br><button onclick=\"runNext('card2','card3')\">Next</button>";
}else{
msg1.innerHTML="Choose Infinity 😤";
}
}

function temple(){msg2.innerHTML="Wrong";}
function house(){
msg2.innerHTML="Correct ❤️<br><button onclick=\"runNext('card3','card4')\">Next</button>";
}

function checkDate(){
let d=dateInput.value.toLowerCase();
if(d.includes("dec") && d.includes("24")){
msg3.innerHTML="Correct 💖<br><button onclick=\"runNext('card4','card5')\">Next</button>";
}else{
msg3.innerHTML="Wrong";
}
}

function movie1(){
msg4.innerHTML="Correct ❤️<br><button onclick=\"runNext('card5','card6')\">Next</button>";
}
function movie2(){msg4.innerHTML="Wrong";}

function correctColor(){
msg5.innerHTML="Correct 🤍<br><button onclick=\"runNext('card6','card7'); confetti(); setTimeout(()=>runNext('card7','card8'),2000);\">Final</button>";
}

function wrongColor(){msg5.innerHTML="Wrong";}

</script>

</body>
</html>
